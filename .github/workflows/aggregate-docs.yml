name: Aggregate Mintlify docs

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/aggregate-docs.yml"
      - "docs.json"
      - "index.mdx"
      - "get-started/**"
      - "guides/**"
      - "snippets/**"
      - "images/**"
      - "logo/**"
      - "favicon.svg"
      - "scripts/**"

concurrency:
  group: aggregate-mintlify-docs
  cancel-in-progress: true

jobs:
  aggregate-docs:
    name: Aggregate docs into docs branch
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Check out docs source
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Aggregate source repos
        env:
          PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}
          SOURCE_REPO_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
          TARGET_REPOSITORY: ${{ github.repository }}
          TARGET_BRANCH: docs
          BASE_SUBDIRECTORY: .
          AGGREGATE_REPOS: >-
            [{"owner":"synthesizebio","repo":"platform","ref":"main","subdirectory":"docs-external"},{"owner":"synthesizebio","repo":"rsynthbio","ref":"main","subdirectory":"docs-external"},{"owner":"synthesizebio","repo":"pysynthbio","ref":"main","subdirectory":"docs-external"}]
        run: node scripts/aggregate-docs.mjs
